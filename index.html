<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101318">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Habit Streak">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Habit Streak Tracker</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Tracker controls">
        <div>
          <h1>Habit Streak Tracker</h1>
          <p id="todayLine" class="subtle"></p>
        </div>
        <div class="actions">
          <span id="syncStatus" class="sync-status">Local</span>
          <button id="themeToggle" class="icon-action" type="button" aria-label="Switch theme" title="Switch theme">Dark</button>
        </div>
      </section>

      <section class="dashboard-grid" aria-label="Habit dashboard">
        <section class="tracker-panel" aria-label="Daily tracker">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Today</p>
              <h2>Checklist</h2>
            </div>
            <div class="date-strip">
              <button id="prevDay" class="icon-button" type="button" aria-label="Previous day">&lsaquo;</button>
              <input id="activeDate" type="date">
              <button id="nextDay" class="icon-button" type="button" aria-label="Next day">&rsaquo;</button>
            </div>
          </div>

          <div class="entry-grid">
            <button class="field-toggle habit-toggle" data-field="supplements" type="button">Supplements</button>
            <button class="field-toggle habit-toggle" data-field="floss" type="button">Floss</button>
            <button class="field-toggle habit-toggle" data-field="legExercise" type="button">Leg Exercise</button>
            <button class="field-toggle habit-toggle" data-field="mentalRoutine" type="button">Mental Routine</button>
            <button class="field-toggle habit-toggle danger-habit" data-field="noSocialMedia" type="button">No Social Media</button>
          </div>

          <div class="input-grid">
            <label class="input-card" id="studyCard">
              <span>Study Hours <strong id="studyTarget">No</strong></span>
              <input id="studyHours" type="number" inputmode="decimal" min="0" max="24" step="0.25">
            </label>
            <label class="input-card" id="bedtimeCard">
              <span>Bedtime <strong id="asleepTarget">No</strong></span>
              <input id="bedtime" type="time">
            </label>
            <label class="input-card" id="wakeCard">
              <span>Wake Time <strong id="wakeTarget">No</strong></span>
              <input id="wakeTime" type="time">
            </label>
            <label class="input-card" id="sleepCard">
              <span>Sleep Hours <strong id="sleepTarget">No</strong></span>
              <input id="sleepHours" type="text" readonly>
            </label>
          </div>
        </section>

        <aside class="streak-panel" aria-label="Streak summary">
          <section id="authPanel" class="auth-panel" aria-label="Cloud sync">
            <div class="auth-head">
              <p class="eyebrow">Cloud</p>
              <h2 id="authTitle">Sign in</h2>
            </div>
            <div id="authForm" class="auth-form">
              <input id="authEmail" type="email" autocomplete="email" placeholder="Email">
              <input id="authPassword" type="password" autocomplete="current-password" placeholder="Password">
              <div class="auth-actions">
                <button id="signInButton" type="button">Sign in</button>
                <button id="signUpButton" class="secondary" type="button">Create account</button>
              </div>
            </div>
            <div id="signedInPanel" class="signed-in-panel" hidden>
              <p id="signedInEmail"></p>
              <button id="signOutButton" class="secondary" type="button">Sign out</button>
            </div>
            <p id="authMessage" class="auth-message"></p>
          </section>

          <section class="flame-card" aria-label="Daily score">
            <div class="flame-topline">
              <div>
                <p class="eyebrow">Flame</p>
                <h2>Daily Score</h2>
              </div>
              <strong id="todayScore">0</strong>
            </div>
            <div class="flame-meter" aria-hidden="true">
              <div id="scoreFill"></div>
            </div>
            <p id="scoreStatus" class="flame-status">Open day</p>
          </section>

          <section class="streak-stack" aria-label="Life streak">
            <article class="summary-card primary-streak">
              <span>Life Streak</span>
              <strong id="lifeStreak">0</strong>
            </article>
            <article class="summary-card">
              <span>Best Life</span>
              <strong id="bestLife">0</strong>
            </article>
            <article class="summary-card">
              <span>Freeze Used</span>
              <strong id="freezeState">No</strong>
            </article>
          </section>

          <section class="protection-panel" aria-label="Freeze protection">
            <div>
              <p class="eyebrow">Protection</p>
              <h2>Streak Freeze</h2>
            </div>
            <button class="field-toggle freeze-action" data-field="freezeUsed" type="button">Activate Freeze</button>
          </section>

          <details class="detail-panel">
            <summary>Category Summary</summary>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Category</th>
                    <th>Current</th>
                    <th>Best</th>
                    <th>Freeze Tokens</th>
                    <th>Raw Perfect</th>
                    <th>Used</th>
                    <th>Today</th>
                  </tr>
                </thead>
                <tbody id="summaryRows"></tbody>
              </table>
            </div>
          </details>

          <details class="detail-panel">
            <summary>Recent History</summary>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Day</th>
                    <th>Score</th>
                    <th>Freeze</th>
                    <th>Life Streak</th>
                  </tr>
                </thead>
                <tbody id="historyRows"></tbody>
              </table>
            </div>
          </details>
        </aside>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
